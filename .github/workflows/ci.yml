name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  cpp-tests:
    name: C++ Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -DXUSHI2_BUILD_VIEWER=OFF
          -DXUSHI2_BUILD_TESTS=ON
          -DXUSHI2_BUILD_PYTHON_MODULE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload C++ test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs
          path: |
            build/Testing/**
            build/**/*.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  python-tests:
    name: Python Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python[dev]'

      - name: Build Python extension for this interpreter
        run: |
          cmake -S . -B build-python \
            -DXUSHI2_BUILD_VIEWER=OFF \
            -DXUSHI2_BUILD_TESTS=OFF \
            -DXUSHI2_BUILD_PYTHON_MODULE=ON \
            -DPython_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" \
            -DPython3_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"
          cmake --build build-python --parallel
          python -c "from xushi2 import xushi2_cpp as m; print(m.__file__)"

      - name: Run Python tests
        run: pytest python/tests

      - name: Upload Python test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-logs
          path: |
            .pytest_cache/**
            python/.pytest_cache/**
          if-no-files-found: ignore

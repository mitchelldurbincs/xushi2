phase: 3
env:
  seed_base: 0xD1CEDA7A
  opponent_bot: noop
  learner_team: A
  reward:
    score_per_second: 0.1
    # Probe-only: zero out kill bonus so the learner can't get distracted by
    # farming the motionless noop opponent instead of capturing the point.
    kill_bonus: 0.0
    # Probe-only: dense per-decision gradient toward the cap. Zero-sum
    # symmetrized in RewardCalculator; with a noop opponent this amounts to a
    # +coef * (dist_enemy - dist_self) signal per step, bounded by
    # shaping_clip=3.0 over the episode.
    distance_shaping_coef: 0.01
  sim:
    round_length_seconds: 30
    fog_of_war_enabled: false
    randomize_map: false
    seed: 0xD1CEDA7A
    action_repeat: 3
    mechanics:
      revolver_damage_centi_hp: 7500
      revolver_fire_cooldown_ticks: 15
      revolver_hitbox_radius: 0.75
      respawn_ticks: 240
model:
  use_recurrence: true
  embed_dim: 64
  gru_hidden: 64
  head_hidden: 64
  action_log_std_init: -1.0
ppo:
  num_envs: 16
  rollout_len: 256
  num_epochs: 4
  minibatch_size: 4
  learning_rate: 3.0e-4
  value_normalization: true
  vector_env: async
  torch_num_threads: 1
  lr_schedule: cosine
  lr_final_ratio: 0.1
  warmup_updates: 0
  clip_ratio: 0.2
  value_clip_ratio: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
run:
  total_updates: 500
  eval_every: 25
  eval_episodes: 20
  checkpoint_every: 100
  early_stop_patience_evals: 0
  early_stop_min_delta: 0.05
  max_regression_from_best: -1
  log_every: 25
  output_dir: runs/phase3_ranger_noop_probe
